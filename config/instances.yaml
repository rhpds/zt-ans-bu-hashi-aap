virtualmachines:
  - name: control
    image: aap-2.6-6-ceh-20260325
    memory: 32G
    cores: 4
    image_size: 50Gi
    tags:
      - key: AnsibleGroup
        value: isolated
    networks:
      - default
      - secondary
    userdata: |-
      #cloud-config
      user: rhel
      password: ansible123!
      chpasswd: { expire: False }
      ssh_pwauth: true
    services:
      - name: control-https
        ports:
          - port: 443
            protocol: TCP
            targetPort: 443
            name: control-https
      - name: control-report
        ports:
          - port: 8088
            protocol: TCP
            targetPort: 8088
            name: control-report
    routes:
      - name: control-https
        host: control
        service: control-https
        targetPort: 443
        tls: true
