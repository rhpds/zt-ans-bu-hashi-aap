---
- name: Run module stage via direct API calls
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    _module_dir: "{{ module_dir | default(module_directory | default('')) }}"
    _guid: "{{ lookup('env', 'GUID') }}"
    _domain: "{{ lookup('env', 'DOMAIN') }}"
    aap_host: "https://control-https"
    aap_username: "admin"
    aap_password: "ansible123!"
    # Use full FQDN for TFE — bare service name returns 301 redirect on POST
    tfe_host: "{{ 'https://tfe-https-' + _guid + '.' + _domain if _guid else 'https://tfe-https' }}"
    tfe_api_token: "{{ lookup('env', 'TFE_API_TOKEN') | default('', true) }}"
    tfe_org: rhdp-tf-org
    tfe_workspace_name: TFE-Demo
    # aws_access_key: "{{ lookup('env', 'AWS_ACCESS_KEY_ID') | default('', true) }}"
    # aws_secret_key: "{{ lookup('env', 'AWS_SECRET_ACCESS_KEY') | default('', true) }}"
    # aws_default_region: "{{ lookup('env', 'AWS_DEFAULT_REGION') | default('us-east-2', true) }}"
  tasks:
    - name: Load secrets (vault-decrypted via VAULT_PASSWORD env var — sets tfe_api_token)
      ansible.builtin.include_vars: secrets.yaml
      ignore_errors: true

    - name: Include module tasks
      ansible.builtin.include_tasks: "{{ _module_dir }}/{{ module_stage }}.yml"
