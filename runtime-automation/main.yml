---
- name: Build inventory
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Add control node
      ansible.builtin.add_host:
        name: control
        ansible_ssh_host: "{{ lookup('env', 'BASTION_HOST') | default('control') }}"
        ansible_ssh_port: "{{ lookup('env', 'BASTION_PORT') | default('22') }}"
        ansible_ssh_user: "{{ lookup('env', 'BASTION_USER') | default('rhel') }}"
        ansible_ssh_pass: "{{ lookup('env', 'BASTION_PASSWORD') }}"
        ansible_python_interpreter: /usr/libexec/platform-python

- name: Run module tasks on control node
  hosts: control
  gather_facts: false
  become: false
  vars:
    _module_dir: "{{ module_dir | default(module_directory | default('')) }}"
    # AAP 2.6 localhost — Controller and Gateway APIs
    aap_host: "https://localhost"
    aap_username: "admin"
    aap_password: "ansible123!"
    tfe_host: "https://tfe-https"
    tfe_api_token: "{{ lookup('env', 'TFE_API_TOKEN') }}"
    tfe_org: rhdp-tf-org
    tfe_workspace_name: TFE-Demo
    # ansible.controller collection path on AAP controller node
    aap_collections_path: /root/ansible-automation-platform-containerized-setup/collections/ansible_collections/

  environment:
    ANSIBLE_COLLECTIONS_PATH: /root/ansible-automation-platform-containerized-setup/collections/ansible_collections/

  tasks:
    - name: Include module tasks
      ansible.builtin.include_tasks: "{{ _module_dir }}/{{ module_stage }}.yml"
