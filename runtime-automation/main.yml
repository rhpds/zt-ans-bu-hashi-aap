---
- name: Run module stage via direct API calls
  hosts: localhost
  connection: local
  gather_facts: false

  vars_files:
    - ../config/secrets.yaml

  vars:
    guid: "{{ lookup('env', 'GUID') }}"
    domain: "{{ lookup('env', 'DOMAIN') }}"
    aap_host: "https://control-{{ lookup('env', 'GUID') }}.{{ lookup('env', 'DOMAIN') }}"
    aap_username: "{{ aap_admin_username | default('admin') }}"
    aap_password: "{{ aap_admin_password | default('ansible123!') }}"
    tfe_host: "https://tfe-https-{{ lookup('env', 'GUID') }}.{{ lookup('env', 'DOMAIN') }}"
    tfe_api_token: "{{ lookup('env', 'TFE_API_TOKEN') }}"
    tfe_org: rhdp-tf-org
    tfe_workspace_name: TFE-Demo

  tasks:
    - name: Include module tasks
      ansible.builtin.include_tasks: "{{ module_dir }}/{{ module_stage }}.yml"
