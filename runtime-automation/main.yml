---
- name: Run module stage via direct API calls
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    guid: "{{ lookup('env', 'GUID') }}"
    domain: "{{ lookup('env', 'DOMAIN') }}"
    # Use internal hostnames — nodes communicate directly without GUID/DOMAIN
    aap_host: "https://control"
    aap_username: "{{ aap_admin_username | default('admin') }}"
    aap_password: "{{ aap_admin_password | default('ansible123!') }}"
    tfe_host: "https://terraform"
    tfe_api_token: "{{ lookup('env', 'TFE_API_TOKEN') }}"
    tfe_org: rhdp-tf-org
    tfe_workspace_name: TFE-Demo
    # Support both variable names — jobs.py sends module_directory, older configs use module_dir
    _module_dir: "{{ module_dir | default(module_directory | default('')) }}"

  tasks:
    - name: Load secrets if available
      ansible.builtin.include_vars: ../config/secrets.yaml
      ignore_errors: true

    - name: Include module tasks
      ansible.builtin.include_tasks: "{{ _module_dir }}/{{ module_stage }}.yml"
