---
# main.yml — stage-based routing:
#   validation/setup → localhost (runner container, K8s service DNS)
#   solve            → control node (SSH, ansible.controller collection)

- name: Build inventory
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Add control node
      ansible.builtin.add_host:
        name: control
        ansible_ssh_host: "{{ lookup('env', 'BASTION_HOST') | default('control') }}"
        ansible_ssh_port: "{{ lookup('env', 'BASTION_PORT') | default('22') }}"
        ansible_ssh_user: "{{ lookup('env', 'BASTION_USER') | default('rhel') }}"
        ansible_ssh_pass: "{{ lookup('env', 'BASTION_PASSWORD') }}"
        ansible_python_interpreter: /usr/libexec/platform-python

- name: Run module tasks
  # solve → SSH to control (ansible.controller available)
  # validation/setup → localhost (K8s service DNS available)
  hosts: "{{ 'control' if module_stage == 'solve' else 'localhost' }}"
  connection: "{{ 'ssh' if module_stage == 'solve' else 'local' }}"
  gather_facts: false
  become: false

  vars:
    _module_dir: "{{ module_dir | default(module_directory | default('')) }}"
    # AAP host differs by stage
    aap_host: "{{ 'https://localhost' if module_stage == 'solve' else 'https://control-https' }}"
    aap_username: "admin"
    aap_password: "ansible123!"
    # TFE host: internal lab hostname for control node, K8s DNS for localhost
    tfe_host: "{{ 'https://terraform' if module_stage == 'solve' else 'https://tfe-https' }}"
    tfe_api_token: "{{ lookup('env', 'TFE_API_TOKEN') }}"
    tfe_org: rhdp-tf-org
    tfe_workspace_name: TFE-Demo

  environment:
    ANSIBLE_COLLECTIONS_PATH: /root/ansible-automation-platform-containerized-setup/collections/ansible_collections/

  tasks:
    - name: Load secrets if available
      ansible.builtin.include_vars: ../config/secrets.yaml
      ignore_errors: true
      when: module_stage != 'solve'

    - name: Include module tasks
      ansible.builtin.include_tasks: "{{ _module_dir }}/{{ module_stage }}.yml"
