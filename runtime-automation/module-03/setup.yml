---
# Setup Module 03 - Runs automatically when module loads
# Shows the GitHub manual steps attendees must complete before
# clicking Next (validation)

- name: Show GitHub prerequisite steps
  ansible.builtin.copy:
    content: |
      Module 3 - Before You Start
      ============================
      This module requires your personal GitHub account.
      Please complete these steps BEFORE clicking Next:

      1. Import this repo to your GitHub account:
         https://github.com/ansible-tmm/aap-hashi-lab-2.git

      2. In Terraform Enterprise, create a new workspace:
         - Type: Version Control Workflow
         - Name: TFE-Demo-VCS
         - Connect to your imported GitHub repo

      3. Configure workspace variables:
         aap_host, aap_username, aap_password,
         vault_addr, vault_role_id, vault_secret_id,
         aws_access_key, aws_secret_key

      4. Disable SSL on the GitHub webhook

      5. Commit a change to TF_templates/AWS/terraform.tfvars
         (change instance_count = 0 to instance_count = 2)
         to trigger the run

      Once TFE runs and AAP workflow completes, click Next.
    dest: "{{ job_info_dir }}/script.out"
  delegate_to: localhost
  when: job_info_dir is defined
