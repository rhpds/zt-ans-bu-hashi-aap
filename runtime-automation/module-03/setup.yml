---
# setup.yml - Module 03
# Auto-runs on module load

- name: Show GitHub VCS info message
  ansible.builtin.copy:
    content: |
      [INFO]
      GitHub VCS integration has been pre-configured for you in this lab.

      In production you would normally:
        1. Register an OAuth App in GitHub
        2. Connect TFE to GitHub as a VCS provider
        3. Create a VCS-backed workspace that auto-triggers on git push

      Click Next to continue to Module 4.
    dest: "{{ job_info_dir }}/validation_failure.out"
  delegate_to: localhost
  when: job_info_dir is defined

- name: Show message
  ansible.builtin.fail:
    msg: "GitHub VCS pre-configured - click Next to continue"
