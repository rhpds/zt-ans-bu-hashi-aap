---
# Solve Module 03 - Two-step approach
# Step 1: Run Solve to set up AAP + see GitHub steps
# Step 2: Do GitHub steps manually, then run Solve again to confirm

# -------------------------------------------------------------------
# Always ensure WF-Launched by TFE exists in AAP (idempotent)
# -------------------------------------------------------------------

- name: Get Default org ID
  ansible.builtin.uri:
    url: "{{ aap_host }}/api/controller/v2/organizations/?name=Default"
    user: "{{ aap_username }}"
    password: "{{ aap_password }}"
    force_basic_auth: true
    validate_certs: false
  register: r_org

- name: Check if WF-Launched by TFE exists
  ansible.builtin.uri:
    url: "{{ aap_host }}/api/controller/v2/workflow_job_templates/?name=WF-Launched+by+TFE"
    user: "{{ aap_username }}"
    password: "{{ aap_password }}"
    force_basic_auth: true
    validate_certs: false
  register: r_wf_check

- name: Create WF-Launched by TFE workflow
  ansible.builtin.uri:
    url: "{{ aap_host }}/api/controller/v2/workflow_job_templates/"
    method: POST
    user: "{{ aap_username }}"
    password: "{{ aap_password }}"
    force_basic_auth: true
    validate_certs: false
    body_format: json
    body:
      name: "WF-Launched by TFE"
      organization: "{{ r_org.json.results[0].id | int }}"
      ask_inventory_on_launch: true
    status_code: [200, 201]
  register: r_wf_create
  when: r_wf_check.json.count == 0

- name: Set workflow ID
  ansible.builtin.set_fact:
    wf_id: "{{ (r_wf_create.json.id if r_wf_check.json.count == 0 else r_wf_check.json.results[0].id) | int }}"

- name: Get inventory source ID for workflow nodes
  ansible.builtin.uri:
    url: "{{ aap_host }}/api/controller/v2/inventory_sources/?name=AWS+source+for+TFE+resources"
    user: "{{ aap_username }}"
    password: "{{ aap_password }}"
    force_basic_auth: true
    validate_certs: false
  register: r_inv_source

- name: Get TFE-VCS job template ID for workflow nodes
  ansible.builtin.uri:
    url: "{{ aap_host }}/api/controller/v2/job_templates/?name=Install+Nginx+on+RHEL+-+TFE-VCS"
    user: "{{ aap_username }}"
    password: "{{ aap_password }}"
    force_basic_auth: true
    validate_certs: false
  register: r_jt_vcs

- name: Add inventory sync node to workflow
  ansible.builtin.uri:
    url: "{{ aap_host }}/api/controller/v2/workflow_job_template_nodes/"
    method: POST
    user: "{{ aap_username }}"
    password: "{{ aap_password }}"
    force_basic_auth: true
    validate_certs: false
    body_format: json
    body:
      workflow_job_template: "{{ wf_id | int }}"
      unified_job_template: "{{ r_inv_source.json.results[0].id | int }}"
    status_code: [200, 201]
  register: r_node1
  when:
    - r_wf_check.json.count == 0
    - r_inv_source.json.count > 0

- name: Add Install Nginx TFE-VCS node to workflow
  ansible.builtin.uri:
    url: "{{ aap_host }}/api/controller/v2/workflow_job_template_nodes/"
    method: POST
    user: "{{ aap_username }}"
    password: "{{ aap_password }}"
    force_basic_auth: true
    validate_certs: false
    body_format: json
    body:
      workflow_job_template: "{{ wf_id | int }}"
      unified_job_template: "{{ r_jt_vcs.json.results[0].id | int }}"
    status_code: [200, 201]
  register: r_node2
  when:
    - r_wf_check.json.count == 0
    - r_jt_vcs.json.count > 0

- name: Link inventory sync -> nginx install
  ansible.builtin.uri:
    url: "{{ aap_host }}/api/controller/v2/workflow_job_template_nodes/{{ r_node1.json.id | int }}/success_nodes/"
    method: POST
    user: "{{ aap_username }}"
    password: "{{ aap_password }}"
    force_basic_auth: true
    validate_certs: false
    body_format: json
    body: "{{ {'id': r_node2.json.id | int} }}"
    status_code: [200, 204]
  when:
    - r_wf_check.json.count == 0
    - r_node1 is defined
    - r_node2 is defined

# -------------------------------------------------------------------
# Check if GitHub steps have been completed (TFE-Demo-VCS exists)
# -------------------------------------------------------------------

- name: Check if TFE-Demo-VCS workspace already exists
  ansible.builtin.uri:
    url: "{{ tfe_host }}/api/v2/organizations/{{ tfe_org }}/workspaces/TFE-Demo-VCS"
    headers:
      Authorization: "Bearer {{ tfe_api_token | default('') }}"
      Content-Type: "application/vnd.api+json"
    validate_certs: false
    status_code: [200, 404]
  register: r_vcs_workspace
  when: tfe_api_token | default('') | length > 0
  ignore_errors: true

- name: Set workspace status fact
  ansible.builtin.set_fact:
    vcs_workspace_done: "{{ r_vcs_workspace.status | default(404) == 200 }}"

# -------------------------------------------------------------------
# Step 2: GitHub steps done — workspace exists, show completion
# -------------------------------------------------------------------

- name: Show completion message (GitHub steps done)
  ansible.builtin.copy:
    content: |
      [INFO]
      [OK] WF-Launched by TFE is configured in AAP
      [OK] TFE-Demo-VCS workspace detected

      AAP and TFE setup is complete!
      Click Next to validate module 3.
    dest: "{{ job_info_dir }}/validation_failure.out"
  delegate_to: localhost
  when:
    - job_info_dir is defined
    - vcs_workspace_done | bool

- name: Succeed when workspace exists
  ansible.builtin.debug:
    msg: "Module 3 setup complete — workspace exists and AAP is configured."
  when: vcs_workspace_done | bool

# -------------------------------------------------------------------
# Step 1: GitHub steps not done yet — show instructions and stop
# -------------------------------------------------------------------

- name: Show GitHub steps (first solve run)
  ansible.builtin.copy:
    content: |
      [INFO]
      [OK] WF-Launched by TFE is configured in AAP

      Now complete these GitHub steps, then run Solve again:

      1. Import to your GitHub: https://github.com/ansible-tmm/aap-hashi-lab-2.git

      2. In TFE: New workspace > Version Control Workflow
         Connect to your imported GitHub repo
         Workspace name: TFE-Demo-VCS

      3. Add workspace variables:
         aap_host, aap_username, aap_password
         vault_addr, vault_role_id, vault_secret_id
         aws_access_key, aws_secret_key, aws_region (us-east-2)

      4. Disable SSL on the GitHub webhook

      5. Run Solve again to confirm setup is complete.
    dest: "{{ job_info_dir }}/validation_failure.out"
  delegate_to: localhost
  when:
    - job_info_dir is defined
    - not vcs_workspace_done | bool

- name: Prompt to complete GitHub steps
  ansible.builtin.fail:
    msg: "Complete the GitHub steps shown above, then run Solve again."
  when: not vcs_workspace_done | bool
