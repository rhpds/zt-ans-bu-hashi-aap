---
# Solve Module 03 - TFE VCS Workspace + Variables + Trigger
# Note: GitHub OAuth connection cannot be automated.
# This solve creates TFE-Demo-VCS workspace and required variables,
# then triggers a plan-only run so the user can move forward.

- name: Set TFE API token
  ansible.builtin.set_fact:
    tfe_token: "{{ lookup('env', 'TFE_API_TOKEN') | default('') }}"
    guid: "{{ lookup('env', 'GUID') }}"
    domain: "{{ lookup('env', 'DOMAIN') }}"

# -------------------------------------------------------------------
# Step 1: Get TFE project ID
# -------------------------------------------------------------------

- name: Get TFE projects
  ansible.builtin.uri:
    url: "{{ tfe_host }}/api/v2/organizations/{{ tfe_org }}/projects"
    headers:
      Authorization: "Bearer {{ tfe_token }}"
      Content-Type: "application/vnd.api+json"
    validate_certs: false
  register: r_projects

- name: Set project ID
  ansible.builtin.set_fact:
    tfe_project_id: "{{ r_projects.json.data | selectattr('attributes.name', 'equalto', 'rhdp-initial-project') | map(attribute='id') | first }}"

# -------------------------------------------------------------------
# Step 2: Create TFE-Demo-VCS workspace (API-based, no VCS needed)
# -------------------------------------------------------------------

- name: Check if TFE-Demo-VCS workspace exists
  ansible.builtin.uri:
    url: "{{ tfe_host }}/api/v2/organizations/{{ tfe_org }}/workspaces/TFE-Demo-VCS"
    headers:
      Authorization: "Bearer {{ tfe_token }}"
      Content-Type: "application/vnd.api+json"
    validate_certs: false
    status_code: [200, 404]
  register: r_ws_check

- name: Create TFE-Demo-VCS workspace
  ansible.builtin.uri:
    url: "{{ tfe_host }}/api/v2/organizations/{{ tfe_org }}/workspaces"
    method: POST
    headers:
      Authorization: "Bearer {{ tfe_token }}"
      Content-Type: "application/vnd.api+json"
    body_format: json
    body:
      data:
        type: workspaces
        attributes:
          name: "TFE-Demo-VCS"
          description: "Using GitHub commits to trigger Plan/Apply Runs"
          execution-mode: remote
          auto-apply: true
        relationships:
          project:
            data:
              type: projects
              id: "{{ tfe_project_id }}"
    validate_certs: false
    status_code: [200, 201]
  register: r_ws_create
  when: r_ws_check.status == 404

- name: Set workspace ID
  ansible.builtin.set_fact:
    vcs_workspace_id: "{{ r_ws_create.json.data.id | default(r_ws_check.json.data.id) }}"

# -------------------------------------------------------------------
# Step 3: Add required Terraform variables to TFE-Demo-VCS
# -------------------------------------------------------------------

- name: Get existing workspace variables
  ansible.builtin.uri:
    url: "{{ tfe_host }}/api/v2/workspaces/{{ vcs_workspace_id }}/vars"
    headers:
      Authorization: "Bearer {{ tfe_token }}"
      Content-Type: "application/vnd.api+json"
    validate_certs: false
  register: r_existing_vars

- name: Set existing variable keys
  ansible.builtin.set_fact:
    existing_var_keys: "{{ r_existing_vars.json.data | map(attribute='attributes.key') | list }}"

- name: Add TFE workspace variables
  ansible.builtin.uri:
    url: "{{ tfe_host }}/api/v2/workspaces/{{ vcs_workspace_id }}/vars"
    method: POST
    headers:
      Authorization: "Bearer {{ tfe_token }}"
      Content-Type: "application/vnd.api+json"
    body_format: json
    body:
      data:
        type: vars
        attributes:
          key: "{{ item.key }}"
          value: "{{ item.value }}"
          category: terraform
          sensitive: "{{ item.sensitive | default(false) }}"
    validate_certs: false
    status_code: [200, 201]
  when: item.key not in existing_var_keys
  loop:
    - key: aap_host
      value: "https://control-{{ guid }}.{{ domain }}"
      sensitive: false
    - key: aap_username
      value: admin
      sensitive: false
    - key: aap_password
      value: "ansible123!"
      sensitive: true
    - key: vault_addr
      value: "https://vault-{{ guid }}.{{ domain }}"
      sensitive: false
    - key: aws_access_key
      value: "{{ lookup('env', 'AWS_ACCESS_KEY_ID') | default('REPLACE_ME') }}"
      sensitive: false
    - key: aws_secret_key
      value: "{{ lookup('env', 'AWS_SECRET_ACCESS_KEY') | default('REPLACE_ME') }}"
      sensitive: true

# -------------------------------------------------------------------
# Step 4: Queue a plan-only run to show workspace is working
# -------------------------------------------------------------------

- name: Queue a plan-only run in TFE-Demo-VCS
  ansible.builtin.uri:
    url: "{{ tfe_host }}/api/v2/runs"
    method: POST
    headers:
      Authorization: "Bearer {{ tfe_token }}"
      Content-Type: "application/vnd.api+json"
    body_format: json
    body:
      data:
        type: runs
        attributes:
          message: "Solve run - plan only"
          plan-only: true
        relationships:
          workspace:
            data:
              type: workspaces
              id: "{{ vcs_workspace_id }}"
    validate_certs: false
    status_code: [200, 201]
  register: r_run
  ignore_errors: true

# -------------------------------------------------------------------
# Write output
# -------------------------------------------------------------------

- name: Write solve output to script.out
  ansible.builtin.copy:
    content: |
      Module 3 Solved
      ===============
      \u2714 TFE workspace 'TFE-Demo-VCS' created
      \u2714 Terraform variables configured (aap_host, aap_username, vault_addr, aws keys)
      \u2714 Plan-only run queued in TFE

      Note: GitHub VCS connection requires manual setup.
      To complete the full scenario, connect the workspace to your
      GitHub fork of ansible-tmm/aap-hashi-lab-2 and commit changes
      to trigger provisioning.
    dest: "{{ job_info_dir }}/script.out"
  delegate_to: localhost
  when: job_info_dir is defined
