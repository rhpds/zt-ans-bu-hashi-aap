---
# Solve Module 03 - AAP work only
# The WF-Launched by TFE workflow in AAP is the only automation possible here.
# GitHub VCS connection, OAuth app, webhook, and commit steps require
# the attendee's personal GitHub account and cannot be automated.

# -------------------------------------------------------------------
# Ensure WF-Launched by TFE exists in AAP (idempotent with module-02)
# -------------------------------------------------------------------

- name: Get Default org ID
  ansible.builtin.uri:
    url: "{{ aap_host }}/api/controller/v2/organizations/?name=Default"
    user: "{{ aap_username }}"
    password: "{{ aap_password }}"
    force_basic_auth: true
    validate_certs: false
  register: r_org

- name: Check if WF-Launched by TFE exists
  ansible.builtin.uri:
    url: "{{ aap_host }}/api/controller/v2/workflow_job_templates/?name=WF-Launched+by+TFE"
    user: "{{ aap_username }}"
    password: "{{ aap_password }}"
    force_basic_auth: true
    validate_certs: false
  register: r_wf_check

- name: Create WF-Launched by TFE workflow
  ansible.builtin.uri:
    url: "{{ aap_host }}/api/controller/v2/workflow_job_templates/"
    method: POST
    user: "{{ aap_username }}"
    password: "{{ aap_password }}"
    force_basic_auth: true
    validate_certs: false
    body_format: json
    body:
      name: "WF-Launched by TFE"
      organization: "{{ r_org.json.results[0].id | int }}"
      ask_inventory_on_launch: true
    status_code: [200, 201]
  register: r_wf_create
  when: r_wf_check.json.count == 0

- name: Set workflow ID
  ansible.builtin.set_fact:
    wf_id: "{{ (r_wf_create.json.id if r_wf_check.json.count == 0 else r_wf_check.json.results[0].id) | int }}"

- name: Get inventory source ID for workflow nodes
  ansible.builtin.uri:
    url: "{{ aap_host }}/api/controller/v2/inventory_sources/?name=AWS+source+for+TFE+resources"
    user: "{{ aap_username }}"
    password: "{{ aap_password }}"
    force_basic_auth: true
    validate_certs: false
  register: r_inv_source

- name: Get TFE-VCS job template ID for workflow nodes
  ansible.builtin.uri:
    url: "{{ aap_host }}/api/controller/v2/job_templates/?name=Install+Nginx+on+RHEL+-+TFE-VCS"
    user: "{{ aap_username }}"
    password: "{{ aap_password }}"
    force_basic_auth: true
    validate_certs: false
  register: r_jt_vcs

- name: Add inventory sync node to workflow
  ansible.builtin.uri:
    url: "{{ aap_host }}/api/controller/v2/workflow_job_template_nodes/"
    method: POST
    user: "{{ aap_username }}"
    password: "{{ aap_password }}"
    force_basic_auth: true
    validate_certs: false
    body_format: json
    body:
      workflow_job_template: "{{ wf_id | int }}"
      unified_job_template: "{{ r_inv_source.json.results[0].id | int }}"
    status_code: [200, 201]
  register: r_node1
  when:
    - r_wf_check.json.count == 0
    - r_inv_source.json.count > 0

- name: Add Install Nginx TFE-VCS node to workflow
  ansible.builtin.uri:
    url: "{{ aap_host }}/api/controller/v2/workflow_job_template_nodes/"
    method: POST
    user: "{{ aap_username }}"
    password: "{{ aap_password }}"
    force_basic_auth: true
    validate_certs: false
    body_format: json
    body:
      workflow_job_template: "{{ wf_id | int }}"
      unified_job_template: "{{ r_jt_vcs.json.results[0].id | int }}"
    status_code: [200, 201]
  register: r_node2
  when:
    - r_wf_check.json.count == 0
    - r_jt_vcs.json.count > 0

- name: Link inventory sync -> nginx install
  ansible.builtin.uri:
    url: "{{ aap_host }}/api/controller/v2/workflow_job_template_nodes/{{ r_node1.json.id | int }}/success_nodes/"
    method: POST
    user: "{{ aap_username }}"
    password: "{{ aap_password }}"
    force_basic_auth: true
    validate_certs: false
    body_format: json
    body: "{{ {'id': r_node2.json.id | int} }}"
    status_code: [200, 204]
  when:
    - r_wf_check.json.count == 0
    - r_node1 is defined
    - r_node2 is defined

# -------------------------------------------------------------------
# Write output with GitHub manual steps
# -------------------------------------------------------------------

- name: Write GitHub steps to output
  ansible.builtin.copy:
    content: |
      [OK] WF-Launched by TFE is configured in AAP

      Complete these GitHub steps manually before clicking Next:

      1. Import to your GitHub: https://github.com/ansible-tmm/aap-hashi-lab-2.git

      2. In TFE: New workspace > Version Control Workflow
         Connect to your imported GitHub repo
         Workspace name: TFE-Demo-VCS

      3. Add workspace variables:
         aap_host, aap_username, aap_password
         vault_addr, vault_role_id, vault_secret_id
         aws_access_key, aws_secret_key

      4. Disable SSL on the GitHub webhook

      5. Commit to TF_templates/AWS/terraform.tfvars:
         change instance_count = 0 to instance_count = 2

      Once TFE runs and AAP workflow completes > click Next to validate.
    dest: "{{ job_info_dir }}/validation_failure.out"
  delegate_to: localhost
  when: job_info_dir is defined

- name: Show GitHub steps to complete
  ansible.builtin.fail:
    msg: "AAP setup done. Complete the GitHub steps shown above, then click Next."
