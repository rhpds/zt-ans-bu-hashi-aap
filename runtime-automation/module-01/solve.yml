---
# Solve Module 01 - AAP + Terraform Enterprise
# Runs on control node via SSH, calls AAP 2.6 Controller API + TFE API
# Creates resources only — does NOT launch any workflows

# -------------------------------------------------------------------
# TFE: Create workspace if it doesn't exist
# -------------------------------------------------------------------

- name: Get TFE projects
  ansible.builtin.uri:
    url: "{{ tfe_host }}/api/v2/organizations/{{ tfe_org }}/projects"
    headers:
      Authorization: "Bearer {{ tfe_api_token }}"
      Content-Type: "application/vnd.api+json"
    validate_certs: false
  register: r_tfe_projects
  when: tfe_api_token | default('') | length > 0

- name: Set TFE project ID
  ansible.builtin.set_fact:
    tfe_project_id: "{{ r_tfe_projects.json.data | selectattr('attributes.name', 'equalto', 'rhdp-initial-project') | map(attribute='id') | first }}"
  when: tfe_api_token | default('') | length > 0

- name: Check if TFE workspace exists
  ansible.builtin.uri:
    url: "{{ tfe_host }}/api/v2/organizations/{{ tfe_org }}/workspaces/{{ tfe_workspace_name }}"
    headers:
      Authorization: "Bearer {{ tfe_api_token }}"
      Content-Type: "application/vnd.api+json"
    validate_certs: false
    status_code: [200, 404]
  register: r_ws_check
  when: tfe_api_token | default('') | length > 0

- name: Create TFE workspace
  ansible.builtin.uri:
    url: "{{ tfe_host }}/api/v2/organizations/{{ tfe_org }}/workspaces"
    method: POST
    headers:
      Authorization: "Bearer {{ tfe_api_token }}"
      Content-Type: "application/vnd.api+json"
    body_format: json
    body:
      data:
        type: workspaces
        attributes:
          name: "{{ tfe_workspace_name }}"
          description: "My Initial Workspace for my first TFE demo."
          execution-mode: remote
        relationships:
          project:
            data:
              type: projects
              id: "{{ tfe_project_id }}"
    validate_certs: false
    status_code: [200, 201]
  register: r_ws_create
  when:
    - tfe_api_token | default('') | length > 0
    - r_ws_check.status == 404

- name: Set workspace ID (new)
  ansible.builtin.set_fact:
    tfe_workspace_id: "{{ r_ws_create.json.data.id }}"
  when:
    - tfe_api_token | default('') | length > 0
    - r_ws_check.status == 404

- name: Set workspace ID (existing)
  ansible.builtin.set_fact:
    tfe_workspace_id: "{{ r_ws_check.json.data.id }}"
  when:
    - tfe_api_token | default('') | length > 0
    - r_ws_check.status == 200

# -------------------------------------------------------------------
# AAP 2.6: Get org ID from Controller API
# -------------------------------------------------------------------

- name: Get Default org ID
  ansible.builtin.uri:
    url: "{{ aap_host }}/api/controller/v2/organizations/?name=Default"
    user: "{{ aap_username }}"
    password: "{{ aap_password }}"
    force_basic_auth: true
    validate_certs: false
  register: r_org

- name: Set org ID
  ansible.builtin.set_fact:
    aap_org_id: "{{ r_org.json.results[0].id }}"

# -------------------------------------------------------------------
# AAP 2.6: Create TFE credential type
# -------------------------------------------------------------------

- name: Check if TFE credential type exists
  ansible.builtin.uri:
    url: "{{ aap_host }}/api/controller/v2/credential_types/?name=Terraform+Enterprise+credential+type"
    user: "{{ aap_username }}"
    password: "{{ aap_password }}"
    force_basic_auth: true
    validate_certs: false
  register: r_cred_type_check

- name: Create TFE credential type
  ansible.builtin.uri:
    url: "{{ aap_host }}/api/controller/v2/credential_types/"
    method: POST
    user: "{{ aap_username }}"
    password: "{{ aap_password }}"
    force_basic_auth: true
    validate_certs: false
    body_format: json
    body:
      name: "Terraform Enterprise credential type"
      kind: cloud
      inputs:
        fields:
          - id: hostname
            type: string
            label: Terraform Enterprise Hostname
          - id: org
            type: string
            label: Organization
          - id: workspace
            type: string
            label: Workspace
          - id: token
            type: string
            label: Token
            secret: true
        required: [hostname, org, workspace, token]
      injectors:
        extra_vars:
          tf_hostname: "{{ '{{' }} hostname {{ '}}' }}"
          tf_org: "{{ '{{' }} org {{ '}}' }}"
          tf_workspace: "{{ '{{' }} workspace {{ '}}' }}"
          tf_token: "{{ '{{' }} token {{ '}}' }}"
    status_code: [200, 201]
  register: r_cred_type_create
  when: r_cred_type_check.json.count == 0

- name: Set credential type ID
  ansible.builtin.set_fact:
    cred_type_id: >-
      {{ r_cred_type_create.json.id
         if r_cred_type_check.json.count == 0
         else r_cred_type_check.json.results[0].id }}

# -------------------------------------------------------------------
# AAP 2.6: Create TFE credential
# -------------------------------------------------------------------

- name: Check if TFE credential exists
  ansible.builtin.uri:
    url: "{{ aap_host }}/api/controller/v2/credentials/?name=Terraform+Enterprise+credential"
    user: "{{ aap_username }}"
    password: "{{ aap_password }}"
    force_basic_auth: true
    validate_certs: false
  register: r_cred_check

- name: Create TFE credential
  ansible.builtin.uri:
    url: "{{ aap_host }}/api/controller/v2/credentials/"
    method: POST
    user: "{{ aap_username }}"
    password: "{{ aap_password }}"
    force_basic_auth: true
    validate_certs: false
    body_format: json
    body:
      name: "Terraform Enterprise credential"
      organization: "{{ aap_org_id }}"
      credential_type: "{{ cred_type_id }}"
      inputs:
        hostname: "{{ tfe_host }}"
        org: "{{ tfe_org }}"
        workspace: "{{ tfe_workspace_name }}"
        token: "{{ tfe_api_token | default('') }}"
    status_code: [200, 201]
  when: r_cred_check.json.count == 0

# -------------------------------------------------------------------
# Write output
# -------------------------------------------------------------------

- name: Write solve output to script.out
  ansible.builtin.copy:
    content: |
      Module 1 Solved
      ===============
      ✔ TFE workspace created/verified: {{ tfe_workspace_name }}
      ✔ TFE credential type created in AAP
      ✔ TFE credential created in AAP

      Remaining tasks (inventory source, job templates, workflows)
      are part of the lab exercises in Tasks 4-7.
    dest: "{{ job_info_dir }}/script.out"
  delegate_to: localhost
  when: job_info_dir is defined
