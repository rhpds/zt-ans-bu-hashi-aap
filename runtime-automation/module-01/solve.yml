---
# Solve Module 01 - AAP + Terraform Enterprise
# Runs on control node via SSH — uses ansible.controller collection
# Creates ALL required resources. Does NOT launch any workflows.

- name: Get TFE projects
  ansible.builtin.uri:
    url: "{{ tfe_host }}/api/v2/organizations/{{ tfe_org }}/projects"
    headers:
      Authorization: "Bearer {{ tfe_api_token }}"
      Content-Type: "application/vnd.api+json"
    validate_certs: false
  register: r_tfe_projects
  when: tfe_api_token | default('') | length > 0

- name: Set TFE project ID
  ansible.builtin.set_fact:
    tfe_project_id: "{{ r_tfe_projects.json.data | selectattr('attributes.name', 'equalto', 'rhdp-initial-project') | map(attribute='id') | first }}"
  when: tfe_api_token | default('') | length > 0

- name: Check TFE workspace exists
  ansible.builtin.uri:
    url: "{{ tfe_host }}/api/v2/organizations/{{ tfe_org }}/workspaces/{{ tfe_workspace_name }}"
    headers:
      Authorization: "Bearer {{ tfe_api_token }}"
      Content-Type: "application/vnd.api+json"
    validate_certs: false
    status_code: [200, 404]
  register: r_ws_check
  when: tfe_api_token | default('') | length > 0

- name: Create TFE workspace
  ansible.builtin.uri:
    url: "{{ tfe_host }}/api/v2/organizations/{{ tfe_org }}/workspaces"
    method: POST
    headers:
      Authorization: "Bearer {{ tfe_api_token }}"
      Content-Type: "application/vnd.api+json"
    body_format: json
    body:
      data:
        type: workspaces
        attributes:
          name: "{{ tfe_workspace_name }}"
          description: "My Initial Workspace for my first TFE demo."
          execution-mode: remote
        relationships:
          project:
            data:
              type: projects
              id: "{{ tfe_project_id }}"
    validate_certs: false
    status_code: [200, 201]
  when:
    - tfe_api_token | default('') | length > 0
    - r_ws_check.status == 404

# -------------------------------------------------------------------
# Use ansible.controller collection — available on the control node
# -------------------------------------------------------------------

- name: Create TFE credential type
  ansible.controller.credential_type:
    name: "Terraform Enterprise credential type"
    description: "Credential type for Terraform Enterprise"
    kind: cloud
    inputs:
      fields:
        - id: hostname
          type: string
          label: Terraform Enterprise Hostname
        - id: org
          type: string
          label: Organization
        - id: workspace
          type: string
          label: Workspace
        - id: token
          type: string
          label: Token
          secret: true
      required: [hostname, org, workspace, token]
    injectors:
      extra_vars:
        tf_hostname: "{{ '{{' }} hostname {{ '}}' }}"
        tf_org: "{{ '{{' }} org {{ '}}' }}"
        tf_workspace: "{{ '{{' }} workspace {{ '}}' }}"
        tf_token: "{{ '{{' }} token {{ '}}' }}"
    state: present
    controller_host: "{{ aap_host }}"
    controller_username: "{{ aap_username }}"
    controller_password: "{{ aap_password }}"
    validate_certs: false

- name: Create TFE credential
  ansible.controller.credential:
    name: "Terraform Enterprise credential"
    organization: Default
    credential_type: "Terraform Enterprise credential type"
    inputs:
      hostname: "{{ tfe_host }}"
      org: "{{ tfe_org }}"
      workspace: "{{ tfe_workspace_name }}"
      token: "{{ tfe_api_token | default('') }}"
    state: present
    controller_host: "{{ aap_host }}"
    controller_username: "{{ aap_username }}"
    controller_password: "{{ aap_password }}"
    validate_certs: false

- name: Create inventory source
  ansible.controller.inventory_source:
    name: "AWS source for TFE resources"
    description: "AWS source for TFE resources"
    inventory: "Terraform Inventory"
    credential: "AWS Credential"
    source: ec2
    execution_environment: "Terraform Execution Environment"
    overwrite: true
    update_on_launch: true
    organization: Default
    source_vars:
      hostnames:
        - "tag:Name"
      compose:
        ansible_host: public_ip_address
        ansible_ssh_pipelining: "true"
    state: present
    controller_host: "{{ aap_host }}"
    controller_username: "{{ aap_username }}"
    controller_password: "{{ aap_password }}"
    validate_certs: false

- name: Create Terraform Enterprise APPLY job template
  ansible.controller.job_template:
    name: "Terraform Enterprise APPLY"
    job_type: run
    organization: Default
    inventory: "Demo Inventory"
    project: "Terraform Demos Project"
    playbook: "playbooks/terraform_apply_plan.yml"
    execution_environment: "Terraform Execution Environment"
    credentials:
      - "Terraform Enterprise credential"
    state: present
    controller_host: "{{ aap_host }}"
    controller_username: "{{ aap_username }}"
    controller_password: "{{ aap_password }}"
    validate_certs: false

- name: Create Terraform Enterprise DESTROY job template
  ansible.controller.job_template:
    name: "Terraform Enterprise DESTROY"
    job_type: run
    organization: Default
    inventory: "Demo Inventory"
    project: "Terraform Demos Project"
    playbook: "playbooks/terraform_destroy_plan.yml"
    execution_environment: "Terraform Execution Environment"
    credentials:
      - "Terraform Enterprise credential"
    state: present
    controller_host: "{{ aap_host }}"
    controller_username: "{{ aap_username }}"
    controller_password: "{{ aap_password }}"
    validate_certs: false

- name: Create WF-Terraform Enterprise APPLY workflow
  ansible.controller.workflow_job_template:
    name: "WF-Terraform Enterprise APPLY"
    organization: Default
    workflow_nodes:
      - identifier: apply_node
        unified_job_template:
          organization:
            name: Default
          name: "Terraform Enterprise APPLY"
          type: job_template
        related:
          success_nodes:
            - identifier: inv_sync_node
          failure_nodes: []
          always_nodes: []
      - identifier: inv_sync_node
        unified_job_template:
          name: "AWS source for TFE resources"
          type: inventory_source
        related:
          success_nodes:
            - identifier: nginx_node
          failure_nodes: []
          always_nodes: []
      - identifier: nginx_node
        unified_job_template:
          organization:
            name: Default
          name: "Install Nginx on RHEL"
          type: job_template
        related:
          success_nodes: []
          failure_nodes: []
          always_nodes: []
    state: present
    controller_host: "{{ aap_host }}"
    controller_username: "{{ aap_username }}"
    controller_password: "{{ aap_password }}"
    validate_certs: false

- name: Create WF-Terraform Enterprise DESTROY workflow
  ansible.controller.workflow_job_template:
    name: "WF-Terraform Enterprise DESTROY"
    organization: Default
    workflow_nodes:
      - identifier: destroy_node
        unified_job_template:
          organization:
            name: Default
          name: "Terraform Enterprise DESTROY"
          type: job_template
        related:
          success_nodes:
            - identifier: destroy_sync_node
          failure_nodes: []
          always_nodes: []
      - identifier: destroy_sync_node
        unified_job_template:
          name: "AWS source for TFE resources"
          type: inventory_source
        related:
          success_nodes: []
          failure_nodes: []
          always_nodes: []
    state: present
    controller_host: "{{ aap_host }}"
    controller_username: "{{ aap_username }}"
    controller_password: "{{ aap_password }}"
    validate_certs: false

- name: Write solve summary
  ansible.builtin.copy:
    content: |
      Module 1 Solved
      ===============
      [OK] TFE workspace: {{ tfe_workspace_name }}
      [OK] TFE credential type
      [OK] TFE credential
      [OK] Inventory source: AWS source for TFE resources
      [OK] Job template: Terraform Enterprise APPLY
      [OK] Job template: Terraform Enterprise DESTROY
      [OK] Workflow: WF-Terraform Enterprise APPLY
      [OK] Workflow: WF-Terraform Enterprise DESTROY

      All resources created. Click Next to validate.
    dest: "{{ job_info_dir }}/script.out"
  delegate_to: localhost
  when: job_info_dir is defined
